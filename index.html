<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DaY.ffirmations</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="DaY.ffirmations – one mystical affirmation each day.">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@400;500&display=swap" rel="stylesheet">

  <!-- Icon -->
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <button id="theme-toggle" class="theme-btn">☾</button>

  <div class="app">
    <header class="app-header">
      <div class="logo">
  <img src="icon.png" alt="DaY.ffirmations logo" class="logo-img">
</div>

      <div class="subtitle">one gentle thought at a time</div>
    </header>

    <main class="card">
      <div class="day-label" id="day-label"></div>
      <div class="quote-text" id="quote-text"></div>
      <div class="quote-tag" id="quote-tag"></div>

      <div class="controls">
        <button id="prev-btn" class="nav-btn">◀</button>
        <button id="today-btn" class="primary-btn">Today</button>
        <button id="next-btn" class="nav-btn">▶</button>
      </div>

<div class="fav-row">
  <button id="fav-btn" class="fav-btn">♡</button>
</div>
<span id="fav-status" class="fav-status"></span>


    </main>

    <section class="favorites">
      <h2>Favorites</h2>
      <div id="fav-list" class="fav-list"></div>
    </section>

    <footer class="app-footer">
      <small>DaY.ffirmations • 365 gentle reminders • stored locally</small>
    </footer>
  </div>

  <script src="quotes.js"></script>
  <script src="app.js"></script>
</body>
</html>
