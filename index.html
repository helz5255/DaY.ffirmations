<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DaY.ffirmations</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="DaY.ffirmations – one mystical, gentle affirmation for every day of the year.">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- käsitsi kirjutatud / müstiline, aga loetav font -->
  <link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="logo">
        <span class="logo-main">DaY.</span><span class="logo-sub">ffirmations</span>
      </div>
      <div class="subtitle">one gentle thought at a time</div>
    </header>

    <main class="card">
      <div class="day-label" id="day-label"></div>
      <div class="quote-text" id="quote-text"></div>
      <div class="quote-tag" id="quote-tag"></div>

      <div class="controls">
        <button id="prev-btn" class="ghost-btn">◀ Previous</button>
        <button id="today-btn" class="primary-btn">Today</button>
        <button id="next-btn" class="ghost-btn">Next ▶</button>
      </div>

      <div class="fav-row">
        <button id="fav-btn" class="icon-btn" title="Save to favorites">♡</button>
        <span id="fav-status" class="fav-status"></span>
      </div>
    </main>

    <section class="favorites">
      <h2>Favorites</h2>
      <div id="fav-list" class="fav-list"></div>
    </section>

    <footer class="app-footer">
      <small>DaY.ffirmations • 365 gentle reminders • stored locally on your device</small>
    </footer>
  </div>

  <script src="quotes.js"></script>
  <script src="app.js"></script>
</body>
</html>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
